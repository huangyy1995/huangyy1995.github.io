<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <span class="brand-icon">✦</span> {{ site.title | escape }}
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a></li>
        <li><a href="{{ '/categories' | relative_url }}" {% if page.url contains 'categories' %}class="active"{% endif %}>分类</a></li>
        <li><a href="{{ '/timeline' | relative_url }}" {% if page.url contains 'timeline' %}class="active"{% endif %}>时间线</a></li>
        <li><a href="{{ '/projects' | relative_url }}" {% if page.url contains 'projects' %}class="active"{% endif %}>项目</a></li>
        <li><a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>关于</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© {{ "now" | date: "%Y" }} <strong>{{ site.author | default: site.title }}</strong> · Built with Jekyll</p>
      {% if site.github_username %}
      <p style="margin-top:6px"><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub ↗</a></p>
      {% endif %}
    </div>
  </footer>

  <script>
    document.getElementById('navToggle').addEventListener('click', function() {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
